name: 24/7 Auto Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিট পর পর ব্যাকআপ চেক

jobs:
  bot-host:
    runs-on: ubuntu-latest
    concurrency:
      group: auto-bot-runner
      cancel-in-progress: false # রানিং থাকলে নতুন করে স্টার্ট করে জ্যাম করবে না

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Modules
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bot Forever
        env:
          PYTHONUNBUFFERED: 1
        run: |
          # এই লুপটি main.py কে অফ হতে দিবে না
          while true; do
            python main.py
            echo "Bot crashed! Restarting in 1 second..."
            sleep 1
          done
        timeout-minutes: 350
