name: CryptoMarketBot 24/7 Runner

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # ম্যানুয়াল ট্রিগার
  schedule:
    - cron: '0 */5 * * *'  # প্রতি ৫ ঘণ্টায় রিস্টার্ট (GitHub 6hr limit bypass)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # আগের রান ক্যানসেল না করে নতুন রান চালু

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ৫ ঘণ্টা ৫০ মিনিট (৬ ঘণ্টা লিমিটের আগে সেভ)

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Bot (Auto-restart every 5 hours)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # ইনফিনিট লুপ - ক্র্যাশ হলে 10 সেকেন্ডে রিস্টার্ট
          while true; do
            echo "🤖 Starting bot at $(date)"
            python bot.py
            echo "⚠️ Bot crashed with exit code $?. Restarting in 10 seconds..."
            sleep 10
          done

  # স্ট্যাটাস চেক
  status-check:
    runs-on: ubuntu-latest
    needs: run-bot
    if: always()
    steps:
      - name: 📊 Final Status
        run: |
          if [ "${{ needs.run-bot.result }}" == "success" ]; then
            echo "✅ Bot completed normally (5hr cycle)"
          else
            echo "❌ Bot failed, check logs"
          fi
